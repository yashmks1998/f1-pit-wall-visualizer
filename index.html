        errorDiv.style.backgroundColor = '#8b0000';

        errorDiv.style.padding = '30px';
        errorDiv.style.fontFamily = 'monospace';
        errorDiv.style.zIndex = '999999';
        errorDiv.style.overflow = 'auto';
        errorDiv.innerHTML = '<h2>[Runtime Error]</h2><p>' + event.message + '</p><p>File: ' + event.filename + ':' + event.lineno + '</p><pre>' + (event.error ? event.error.stack : '') + '</pre>';
        document.body.appendChild(errorDiv);
      });
